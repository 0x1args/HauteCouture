version: '3.8'
name: hautecouture-infra

services:
  postgres:
    container_name: hautecouture-postgres
    image: postgres:17-alpine
    restart: on-failure
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hautecouture}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hautecouture}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal

  pgadmin:
    container_name: hautecouture-pgadmin
    image: dpage/pgadmin4:9.11
    restart: on-failure
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@noreply.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-changeme}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - internal

  redis:
    container_name: hautecouture-redis
    image: redis:8.0.4-alpine
    restart: on-failure
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - internal

volumes:
  postgres-data:
  pgadmin-data:
  redis-data:

networks:
  internal:
    name: hautecouture-internal-development
    driver: bridge
    external: false