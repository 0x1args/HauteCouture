version: '3.8'

services:
  seq:
    container_name: hautecouture-seq
    image: datalust/seq:2025.2
    restart: on-failure
    environment:
      - ACCEPT_EULA=Y         
      - SEQ_FIRSTRUN_ADMINPASSWORD=p4ssw0rd! 
    ports:
      - "5341:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - seq-data:/data
    networks:
      - internal

  postgres:
    container_name: hautecouture-postgres
    image: postgres:17-alpine
    restart: on-failure
    environment:
      POSTGRES_DB: hautecouture
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: p4ssw0rd
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hautecouture"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal

  pgadmin:
    container_name: hautecouture-pgadmin
    image: dpage/pgadmin4:9.11
    restart: on-failure
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@noreply.com
      PGADMIN_DEFAULT_PASSWORD: postgres
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - internal
  
  redis:
    container_name: hautecouture-redis
    image: redis:8.0.4-alpine
    restart: on-failure
    command: ["redis-server", "--requirepass", "p4ssw0rd"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "p4ssw0rd", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - internal

volumes:
  seq-data:
  postgres-data:
  pgadmin-data:
  redis-data:

networks:
  internal:
    name: hautecouture-internal-development
    driver: bridge